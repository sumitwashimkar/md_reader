<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Markdown Reader</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #f8f5f0;
    --surface: #fffdfa;
    --surface-warm: #fbf7f0;
    --ink: #17120e;
    --muted: #756b63;
    --line: #dfd5c8;
    --line-soft: #ece5dc;
    --brand: #6f3d2b;
    --brand-dark: #563020;
    --rust: #aa2535;
    --green: #4d9665;
    --shadow: 0 18px 45px rgba(75, 54, 36, 0.12), 0 2px 8px rgba(75, 54, 36, 0.08);
    --mono: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --serif: 'Playfair Display', Georgia, serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    color: var(--ink);
    font-family: var(--sans);
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 35%),
      linear-gradient(135deg, #fbfaf8 0%, var(--bg) 45%, #f6efe5 100%);
  }

  button, textarea { font: inherit; }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 36px;
    gap: 22px;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(280px, 1fr) auto;
    align-items: center;
    gap: 24px;
    border-bottom: 1px solid var(--line);
    padding: 0 2px 22px;
  }

  .brand-wrap {
    display: flex;
    align-items: center;
    min-width: 0;
    gap: 16px;
  }

  .logo {
    width: 66px;
    height: 66px;
    flex: 0 0 auto;
    display: grid;
    place-items: center;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: linear-gradient(180deg, #fffefb 0%, #f6efe5 100%);
    box-shadow: 0 8px 20px rgba(84, 60, 40, 0.08);
  }

  .logo-mark {
    width: 46px;
    height: 38px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: -0.14em;
    color: #0d0d0d;
  }

  .logo-mark span {
    position: relative;
    z-index: 1;
    display: inline-block;
    line-height: 1;
  }

  .logo-mark .mark-m {
    font-size: 2.22rem;
    transform: translateX(3px);
  }

  .logo-mark .mark-r {
    color: #19130f;
    font-size: 1.92rem;
    font-style: italic;
    transform: translate(-2px, 3px);
  }

  .logo-mark::before {
    content: "";
    position: absolute;
    width: 5px;
    height: 32px;
    right: 9px;
    bottom: 4px;
    border-radius: 999px;
    background: var(--rust);
    transform: rotate(-18deg);
    transform-origin: bottom center;
    z-index: 0;
    box-shadow: 0 0 0 2px rgba(170, 37, 53, 0.06);
  }

  .logo-mark::after {
    content: "";
    position: absolute;
    left: 7px;
    right: 6px;
    bottom: 0;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(170, 37, 53, 0.62), transparent);
  }

  .brand-copy {
    min-width: 0;
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  h1 {
    margin: 0;
    font-family: var(--serif);
    font-size: clamp(1.65rem, 2.2vw, 2.25rem);
    line-height: 1.05;
    letter-spacing: 0;
    color: #473020;
  }

  .version {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 45px;
    height: 28px;
    padding: 0 10px;
    border-radius: 9px;
    background: #eee8df;
    color: #6f6258;
    font-size: 0.8rem;
    font-weight: 500;
  }

  .subtitle {
    margin: 8px 0 0;
    color: #6f6258;
    font-size: 1rem;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 14px;
    flex-wrap: wrap;
  }

  .mobile-view-toggle {
    display: none;
  }

  .metric-card,
  .action-btn {
    min-height: 64px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 253, 250, 0.88);
    box-shadow: 0 8px 22px rgba(91, 64, 42, 0.08);
  }

  .metric-card {
    min-width: 132px;
    display: grid;
    grid-template-columns: 14px 1fr;
    gap: 10px;
    align-items: center;
    padding: 12px 18px;
  }

  .metric-card.words {
    min-width: 96px;
    grid-template-columns: 1fr;
  }

  .status-dot {
    width: 9px;
    height: 9px;
    border-radius: 99px;
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(77, 150, 101, 0.12);
  }

  .metric-label {
    display: block;
    color: #3e342e;
    font-size: 0.88rem;
    font-weight: 500;
  }

  .metric-value {
    display: block;
    color: #2b211b;
    font-size: 1rem;
    line-height: 1.45;
  }

  .action-btn {
    height: 64px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 20px;
    color: #201915;
    cursor: pointer;
    transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease, background 140ms ease;
  }

  .action-btn:hover {
    transform: translateY(-1px);
    border-color: #cdbfaf;
    box-shadow: 0 12px 24px rgba(91, 64, 42, 0.12);
  }

  .action-btn:focus-visible,
  .view-option:focus-visible,
  .icon-btn:focus-visible,
  textarea:focus-visible {
    outline: 3px solid rgba(111, 61, 43, 0.22);
    outline-offset: 2px;
  }

  .action-btn.primary {
    min-width: 160px;
    color: #fff;
    border-color: var(--brand);
    background: linear-gradient(180deg, #74432f 0%, var(--brand-dark) 100%);
  }

  .action-btn.primary:hover {
    border-color: #4a281a;
    background: linear-gradient(180deg, #81503b 0%, #4f2c1f 100%);
  }

  .view-option {
    min-height: 44px;
    border: 0;
    border-radius: 7px;
    color: #5f554d;
    background: transparent;
    font-weight: 700;
    cursor: pointer;
    transition: color 140ms ease, background 140ms ease, box-shadow 140ms ease;
  }

  .view-option[aria-pressed="true"] {
    color: #fff;
    background: var(--brand);
    box-shadow: 0 8px 18px rgba(91, 64, 42, 0.16);
  }

  .icon {
    width: 19px;
    height: 19px;
    stroke: currentColor;
    stroke-width: 1.9;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex: 0 0 auto;
  }

  #fileInput { display: none; }

  .workspace {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 28px;
    align-items: stretch;
  }

  .workspace.layout-solo-left,
  .workspace.layout-solo-right {
    grid-template-columns: minmax(0, 1fr);
  }

  .workspace.layout-solo-left .preview-pane,
  .workspace.layout-solo-right .input-pane {
    display: none;
  }

  .pane {
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--line);
    border-radius: 9px;
    background: rgba(255, 253, 250, 0.9);
    box-shadow: var(--shadow);
  }

  .pane-header {
    min-height: 66px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 26px;
    border-bottom: 1px solid var(--line);
    background: rgba(251, 247, 240, 0.92);
  }

  .pane-title,
  .pane-tools {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .pane-title strong {
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 28px;
    padding: 0 13px;
    border-radius: 99px;
    background: #eee8df;
    color: #5d5148;
    font-size: 0.86rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border: 0;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: #7b7067;
    background: transparent;
    cursor: pointer;
    transition: color 140ms ease, background 140ms ease;
  }

  .icon-btn:hover,
  .icon-btn[aria-pressed="true"] {
    color: var(--brand-dark);
    background: #eee8df;
  }

  .restore-btn {
    display: none;
    min-height: 38px;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: #fff;
    background: var(--brand);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
  }

  .restore-btn:hover {
    background: var(--brand-dark);
    box-shadow: 0 8px 18px rgba(91, 64, 42, 0.16);
    transform: translateY(-1px);
  }

  .restore-btn:focus-visible {
    outline: 3px solid rgba(111, 61, 43, 0.22);
    outline-offset: 2px;
  }

  .workspace.layout-solo-left .restore-preview,
  .workspace.layout-solo-right .restore-editor {
    display: inline-flex;
  }

  .editor-wrap {
    min-height: 0;
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: rgba(255, 253, 250, 0.74);
  }

  .editor-grid {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr);
    overflow: hidden;
  }

  .line-numbers,
  textarea {
    padding-top: 29px;
    padding-bottom: 28px;
    font-family: var(--mono);
    font-size: 0.95rem;
    line-height: 1.95;
  }

  .line-numbers {
    overflow: hidden;
    padding-left: 24px;
    padding-right: 18px;
    color: #6b7178;
    text-align: right;
    user-select: none;
    white-space: pre;
  }

  textarea {
    width: 100%;
    height: 100%;
    min-height: 420px;
    resize: none;
    border: 0;
    outline: 0;
    overflow: auto;
    padding-left: 0;
    padding-right: 30px;
    color: #2b3440;
    caret-color: var(--brand);
    background: transparent;
  }

  textarea::placeholder { color: #9b948b; }
  textarea::-webkit-scrollbar,
  .preview-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  textarea::-webkit-scrollbar-track,
  .preview-scroll::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb,
  .preview-scroll::-webkit-scrollbar-thumb { background: #d8cfc3; border-radius: 99px; }

  .editor-status {
    min-height: 60px;
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 0 36px;
    border-top: 1px solid var(--line);
    color: #6e665e;
    font-size: 0.9rem;
    background: rgba(251, 247, 240, 0.9);
  }

  .editor-status .spacer { flex: 1; }

  .small-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
  }

  .preview-scroll {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 54px 50px 60px;
  }

  .empty-state {
    height: 100%;
    display: grid;
    place-items: center;
    color: #8a8178;
    text-align: center;
  }

  .empty-card {
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 32px;
    background: rgba(251, 247, 240, 0.72);
  }

  .empty-card p {
    margin: 12px 0 0;
    line-height: 1.6;
  }

  .md-content {
    max-width: 820px;
    color: #191613;
    animation: fadeIn 220ms ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .md-content h1 {
    margin: 0 0 24px;
    color: #0d0d0d;
    font-family: var(--serif);
    font-size: clamp(2rem, 2.4vw, 2.55rem);
    line-height: 1.12;
    letter-spacing: 0;
  }

  .md-content h2 {
    margin: 34px 0 18px;
    padding-top: 28px;
    border-top: 1px solid var(--line);
    color: #111;
    font-family: var(--serif);
    font-size: clamp(1.55rem, 1.9vw, 2rem);
    line-height: 1.16;
    letter-spacing: 0;
  }

  .md-content h3 {
    margin: 28px 0 12px;
    color: #563020;
    font-size: 1.25rem;
  }

  .md-content h4,
  .md-content h5,
  .md-content h6 {
    margin: 24px 0 10px;
    color: #5f574f;
    font-size: 1rem;
  }

  .md-content p {
    margin: 0 0 18px;
    color: #34323a;
    font-size: 1.05rem;
    line-height: 1.72;
  }

  .md-content strong { font-weight: 700; }
  .md-content em { color: #4d443d; }

  .md-content a {
    color: var(--brand);
    text-underline-offset: 3px;
  }

  .md-content ul,
  .md-content ol {
    margin: 0 0 22px;
    padding-left: 28px;
  }

  .md-content li {
    margin: 10px 0;
    font-size: 1.05rem;
    line-height: 1.55;
  }

  .md-content blockquote {
    margin: 28px 0 0;
    padding: 22px 32px;
    border: 1px solid var(--line);
    border-left: 6px solid var(--green);
    border-radius: 7px;
    background: rgba(251, 247, 240, 0.88);
    color: #37404a;
  }

  .md-content blockquote p {
    margin: 0;
  }

  .md-content code {
    display: inline-block;
    padding: 1px 8px;
    border: 1px solid var(--line-soft);
    border-radius: 7px;
    background: #eee8df;
    font-family: var(--mono);
    font-size: 0.86em;
  }

  .md-content pre {
    margin: 24px 0;
    padding: 20px 22px;
    overflow: auto;
    border-radius: 8px;
    background: #28231f;
  }

  .md-content pre code {
    display: block;
    padding: 0;
    border: 0;
    color: #f3eadf;
    background: transparent;
  }

  .md-content hr {
    margin: 30px 0;
    border: 0;
    border-top: 1px solid var(--line);
  }

  .md-content table {
    width: 100%;
    margin: 22px 0;
    border-collapse: collapse;
    font-size: 0.96rem;
  }

  .md-content th,
  .md-content td {
    border: 1px solid var(--line);
    padding: 10px 13px;
    text-align: left;
  }

  .md-content th { background: #f1ebe2; }
  .md-content img { max-width: 100%; border-radius: 8px; }

  @media (max-width: 1120px) {
    body { overflow: auto; }
    .app { min-height: 100vh; height: auto; padding: 24px; overflow: visible; }
    .topbar { grid-template-columns: 1fr; }
    .toolbar { justify-content: flex-start; }
    .workspace { min-height: 980px; grid-template-columns: 1fr; grid-template-rows: minmax(440px, 1fr) minmax(440px, 1fr); gap: 20px; }
  }

  @media (max-width: 700px) {
    html, body {
      height: 100%;
      overflow: hidden;
    }

    .app {
      height: 100dvh;
      min-height: 100dvh;
      padding: clamp(10px, 3.8vw, 16px);
      gap: clamp(10px, 3vw, 14px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      flex: 0 0 auto;
      flex-direction: column;
      align-items: stretch;
      gap: clamp(10px, 3vw, 14px);
      padding-bottom: clamp(10px, 3vw, 14px);
    }

    .brand-wrap { align-items: flex-start; }
    .logo { width: 52px; height: 52px; }
    .title-row { flex-wrap: wrap; gap: 8px; }
    h1 { font-size: 1.55rem; }
    .subtitle { font-size: 0.92rem; }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(8px, 2.6vw, 10px);
    }

    .metric-card, .action-btn { min-height: 56px; }

    .metric-card,
    .action-btn {
      width: 100%;
      min-width: 0;
      padding: 0 clamp(10px, 3.4vw, 14px);
    }

    .metric-card {
      min-height: 50px;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .action-btn.primary {
      min-width: 0;
    }

    .copy-action { order: 1; }
    .upload-action { order: 2; }
    .mobile-view-toggle { order: 3; }
    .clear-action { order: 4; }
    .file-metric { order: 5; }
    .words-metric { order: 6; }

    .clear-action,
    .file-metric,
    .words-metric {
      display: none;
    }

    .mobile-view-toggle {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255, 253, 250, 0.88);
      box-shadow: 0 8px 22px rgba(91, 64, 42, 0.08);
    }

    .workspace {
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      gap: 0;
    }

    .workspace.mobile-preview .input-pane,
    .workspace.mobile-input .preview-pane {
      display: none;
    }

    .workspace.mobile-input .input-pane,
    .workspace.mobile-preview .preview-pane {
      display: flex;
    }

    .pane {
      height: 100%;
      border-radius: 8px;
    }

    .pane-header { padding: 0 14px; min-height: 58px; gap: 10px; }
    .pane-title { gap: 9px; }
    .pane-tools { gap: 4px; }
    .pane-tools .icon-btn { display: none; }
    .restore-btn { width: 34px; min-height: 34px; padding: 0; }
    .restore-btn span { display: none; }
    .pill { display: none; }
    .editor-grid { grid-template-columns: 48px minmax(0, 1fr); }
    .line-numbers, textarea { font-size: 0.82rem; line-height: 1.85; padding-top: 20px; }
    .line-numbers { padding-left: 12px; padding-right: 12px; }
    textarea { min-height: 0; padding-right: 16px; }
    .editor-status { min-height: 52px; padding: 0 18px; gap: 12px; font-size: 0.82rem; }
    .preview-scroll { padding: 30px 24px 36px; }
    .md-content h1 { font-size: 2rem; }
    .md-content h2 { font-size: 1.55rem; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand-wrap">
      <div class="logo" aria-hidden="true">
        <div class="logo-mark">
          <span class="mark-m">M</span>
          <span class="mark-r">R</span>
        </div>
      </div>
      <div class="brand-copy">
        <div class="title-row">
          <h1>Markdown Reader</h1>
          <span class="version">v1.0</span>
        </div>
        <p class="subtitle">Real-time Markdown editor with live preview</p>
      </div>
    </div>

    <div class="toolbar" aria-label="Document actions">
      <div class="metric-card file-metric">
        <span class="status-dot" aria-hidden="true"></span>
        <span>
          <span class="metric-label">File Status</span>
          <span class="metric-value" id="fileNameLabel">No file loaded</span>
        </span>
      </div>

      <div class="metric-card words words-metric">
        <span>
          <span class="metric-label">Words</span>
          <span class="metric-value" id="wordCount">0</span>
        </span>
      </div>

      <label class="action-btn upload-action" for="fileInput">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M5 15v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/></svg>
        <span>Upload .md File</span>
      </label>
      <input type="file" id="fileInput" accept=".md,.markdown,.txt" />

      <button class="action-btn clear-action" type="button" onclick="clearAll()">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 15H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        <span>Clear</span>
      </button>

      <button class="action-btn primary copy-action" id="copyBtn" type="button" onclick="copyToClipboard()">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="10" height="10" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"/></svg>
        <span>Copy HTML</span>
      </button>

      <div class="mobile-view-toggle" aria-label="Switch editor view">
        <button class="view-option" id="mobileInputBtn" type="button" aria-pressed="true">Input</button>
        <button class="view-option" id="mobilePreviewBtn" type="button" aria-pressed="false">Preview</button>
      </div>
    </div>
  </header>

  <main class="workspace" id="mainLayout">
    <section class="pane input-pane" aria-label="Markdown input">
      <div class="pane-header">
        <div class="pane-title">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/><path d="m14 4-4 16"/></svg>
          <strong>Markdown Input</strong>
          <button class="icon-btn" type="button" title="Markdown text is rendered live">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 1 1 4.8 2.4c-.9.6-1.4 1-1.4 2.1"/><path d="M12 17h.01"/></svg>
          </button>
          <span class="pill">Editing</span>
        </div>
        <div class="pane-tools">
          <button class="restore-btn restore-preview" type="button" onclick="setLayout('split')">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h7v14H3z"/><path d="M14 5h7v14h-7z"/></svg>
            <span>Show preview</span>
          </button>
          <button class="icon-btn" id="showInputBtn" type="button" aria-label="Show input only" title="Show input only" aria-pressed="false">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
          </button>
        </div>
      </div>

      <div class="editor-wrap">
        <div class="editor-grid">
          <div class="line-numbers" id="lineNumbers" aria-hidden="true">1</div>
          <textarea id="editor" spellcheck="false" placeholder="Paste your Markdown here and watch it render live on the right."></textarea>
        </div>
        <div class="editor-status">
          <span id="cursorStatus">Ln 1, Col 1</span>
          <span>|</span>
          <span id="lineCount">1 line</span>
          <span class="spacer"></span>
          <span>markdown</span>
          <span class="small-dot" aria-hidden="true"></span>
        </div>
      </div>
    </section>

    <section class="pane preview-pane" aria-label="Live preview">
      <div class="pane-header">
        <div class="pane-title">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
          <strong>Live Preview</strong>
        </div>
        <div class="pane-tools">
          <button class="restore-btn restore-editor" type="button" onclick="setLayout('split')">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h7v14H3z"/><path d="M14 5h7v14h-7z"/></svg>
            <span>Show editor</span>
          </button>
          <button class="icon-btn" type="button" title="Copy HTML" onclick="copyToClipboard()">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="10" height="10" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="icon-btn" type="button" title="Show preview only" onclick="setLayout(mainLayout.classList.contains('layout-solo-right') ? 'split' : 'preview')">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
          </button>
        </div>
      </div>

      <div class="preview-scroll" id="previewScroll">
        <div class="empty-state" id="emptyState">
          <div class="empty-card">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            <p>Your rendered markdown<br/>will appear here</p>
          </div>
        </div>
        <div class="md-content" id="preview" style="display:none"></div>
      </div>
    </section>
  </main>
</div>

<script>
  const defaultMarkdown = `# Welcome to Markdown Reader

**Markdown Reader** is a simple yet powerful online Markdown
editor with real-time preview.

## Features

- Live preview as you type
- Upload and edit \`.md\` files
- Copy rendered HTML
- Clean, distraction-free interface

> Write in Markdown on the left,
> see the magic happen on the right.
`;

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const emptyState = document.getElementById('emptyState');
  const wordCount = document.getElementById('wordCount');
  const fileInput = document.getElementById('fileInput');
  const fileNameLabel = document.getElementById('fileNameLabel');
  const mainLayout = document.getElementById('mainLayout');
  const showInputBtn = document.getElementById('showInputBtn');
  const mobileInputBtn = document.getElementById('mobileInputBtn');
  const mobilePreviewBtn = document.getElementById('mobilePreviewBtn');
  const lineNumbers = document.getElementById('lineNumbers');
  const lineCount = document.getElementById('lineCount');
  const cursorStatus = document.getElementById('cursorStatus');
  const copyBtn = document.getElementById('copyBtn');

  marked.setOptions({ breaks: true, gfm: true });

  function render(md) {
    if (!md.trim()) {
      emptyState.style.display = 'grid';
      preview.style.display = 'none';
      preview.innerHTML = '';
      return;
    }
    emptyState.style.display = 'none';
    preview.style.display = 'block';
    preview.innerHTML = marked.parse(md);
  }

  function updateStats(md) {
    const words = md.trim() ? md.trim().split(/\s+/).length : 0;
    wordCount.textContent = words.toLocaleString();

    const lines = md.split('\n').length;
    lineCount.textContent = `${lines.toLocaleString()} ${lines === 1 ? 'line' : 'lines'}`;
    lineNumbers.textContent = Array.from({ length: lines }, (_, i) => i + 1).join('\n');
    updateCursorStatus();
  }

  function updateCursorStatus() {
    const textToCursor = editor.value.slice(0, editor.selectionStart);
    const row = textToCursor.split('\n');
    const line = row.length;
    const col = row[row.length - 1].length + 1;
    cursorStatus.textContent = `Ln ${line}, Col ${col}`;
  }

  function syncEditorScroll() {
    lineNumbers.style.transform = `translateY(${-editor.scrollTop}px)`;
  }

  function updateAll() {
    render(editor.value);
    updateStats(editor.value);
    syncEditorScroll();
  }

  function setLayout(mode) {
    mainLayout.classList.toggle('layout-solo-left', mode === 'input');
    mainLayout.classList.toggle('layout-solo-right', mode === 'preview');
    showInputBtn.setAttribute('aria-pressed', mode === 'input' ? 'true' : 'false');
    if (mode === 'input' || mode === 'preview') {
      setMobileView(mode);
    }
  }

  function setMobileView(mode) {
    mainLayout.classList.toggle('mobile-input', mode === 'input');
    mainLayout.classList.toggle('mobile-preview', mode === 'preview');
    mobileInputBtn.setAttribute('aria-pressed', mode === 'input' ? 'true' : 'false');
    mobilePreviewBtn.setAttribute('aria-pressed', mode === 'preview' ? 'true' : 'false');
  }

  showInputBtn.addEventListener('click', () => {
    const isInputSolo = mainLayout.classList.contains('layout-solo-left');
    setLayout(isInputSolo ? 'split' : 'input');
  });

  mobileInputBtn.addEventListener('click', () => setMobileView('input'));
  mobilePreviewBtn.addEventListener('click', () => setMobileView('preview'));

  editor.addEventListener('input', updateAll);
  editor.addEventListener('click', updateCursorStatus);
  editor.addEventListener('keyup', updateCursorStatus);
  editor.addEventListener('select', updateCursorStatus);
  editor.addEventListener('scroll', syncEditorScroll);

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadFile(file);
  });

  document.addEventListener('dragover', e => {
    e.preventDefault();
  });

  document.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  function loadFile(file) {
    fileNameLabel.textContent = file.name;
    const reader = new FileReader();
    reader.onload = ev => {
      editor.value = ev.target.result;
      updateAll();
    };
    reader.readAsText(file);
  }

  function copyToClipboard() {
    const html = preview.innerHTML;
    if (!html) return;
    navigator.clipboard.writeText(html).then(() => {
      const label = copyBtn.querySelector('span');
      label.textContent = 'Copied!';
      setTimeout(() => label.textContent = 'Copy HTML', 1600);
    });
  }

  function clearAll() {
    editor.value = '';
    fileNameLabel.textContent = 'No file loaded';
    fileInput.value = '';
    updateAll();
  }

  setLayout('split');
  setMobileView('input');
  editor.value = defaultMarkdown;
  updateAll();
</script>
</body>
</html>
